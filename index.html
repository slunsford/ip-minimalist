<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>IP Minimalist</title>
    <meta property="og:title" content="IP Minimalist">
    <meta property="og:description" content="Just your IP address">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.ipminimalist.com/">
    <meta property="og:image" content="https://www.ipminimalist.com/img/og.png">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="IP Minimalist">
    <meta name="twitter:description" content="Just your IP address">
    <meta name="twitter:image" content="https://www.ipminimalist.com/img/og.png">

    <link rel="icon" type="image/png" sizes="16x16" href="img/favicon-16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32.png">
    <link rel="icon" type="image/png" sizes="48x48" href="img/favicon-48.png">
    <link rel="apple-touch-icon" href="img/favicon.png">
    <meta name="msapplication-TileColor" content="#1E1E1E">
    <meta name="msapplication-TileImage" content="img/favicon.png">

    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        text-align: center;
        font-family: system-ui, sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        margin: 0;
      }
      main {
        margin-top: 1.5rem;
        font-weight: 600;
        flex: 1;
      }
      footer {
        margin-bottom: 0.5rem;
        font-size: small;
        font-weight: normal;

        a {
          color: inherit;
          opacity: 0.5;
        }
        a:hover {
          opacity: 0.7;
        }
      }
      .ip {
        font-size: clamp(1rem, 10vw, 3rem);
        font-weight: 900;
        word-break: break-word;
      }
      .copy-link {
        display: inline-block;
        margin-top: 0.5rem;
        font-size: 0.9rem;
        font-weight: normal;
        color: inherit;
        opacity: 0.6;
        text-decoration: none;
        cursor: pointer;
      }
      .copy-link:hover {
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <main>
      <p>Your IP address is:</p>
      <div class="ip"></div>
      <a href="#" class="copy-link" onclick="copyIP(event)">Copy</a>
    </main>
    <footer>
      <a href="https://github.com/slunsford/ip-minimalist" target="_blank">GitHub</a>
    </footer>
    <script>
      let currentIP = '';
      
      fetch('https://api.ipify.org?format=text')
        .then(r => r.text())
        .then(ip => {
          const cleanIp = ip.trim();
          currentIP = cleanIp;
          document.querySelector('.ip').textContent = cleanIp;
          document.title = cleanIp;
        });
      
      function copyIP(event) {
        event.preventDefault();
        if (currentIP) {
          navigator.clipboard.writeText(currentIP).then(() => {
            const copyLink = document.querySelector('.copy-link');
            const originalText = copyLink.textContent;
            copyLink.textContent = 'Copied!';
            setTimeout(() => {
              copyLink.textContent = originalText;
            }, 1000);
          }).catch(() => {});
        }
      }
    </script>
  </body>
</html>
