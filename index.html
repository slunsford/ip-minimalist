<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>IP Minimalist</title>
    <meta property="og:title" content="IP Minimalist">
    <meta property="og:description" content="Just your IP address">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.ipminimalist.com/">
    <meta property="og:image" content="https://www.ipminimalist.com/img/og.png">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="IP Minimalist">
    <meta name="twitter:description" content="Just your IP address">
    <meta name="twitter:image" content="https://www.ipminimalist.com/img/og.png">

    <link rel="icon" type="image/png" sizes="16x16" href="img/favicon-16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32.png">
    <link rel="icon" type="image/png" sizes="48x48" href="img/favicon-48.png">
    <link rel="apple-touch-icon" href="img/favicon.png">
    <meta name="msapplication-TileColor" content="#1E1E1E">
    <meta name="msapplication-TileImage" content="img/favicon.png">

    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        text-align: center;
        font-family: system-ui, sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        margin: 0;
      }
      main {
        margin-top: 1.5rem;
        font-weight: 600;
        flex: 1;
      }
      footer {
        margin-bottom: 0.5rem;

        a {
          display: inline-block;
          color: inherit;
          opacity: 0.5;

          svg {
            display: block;
            width: 1.4rem;
            height: 1.4rem;
            fill: currentColor;
          }
        }
        a:hover {
          opacity: 0.7;
        }
      }
      .ip-row {
        display: flex;
        justify-content: center;
        align-items: center;
        visibility: hidden;

        &::before {
          content: '';
          width: 1.75rem;
          flex-shrink: 0;
        }
      }
      .ip {
        font-size: clamp(1rem, 10vw, 3rem);
        font-weight: 900;
        word-break: break-word;
      }
      .copy-link {
        margin-left: 0.5rem;
        flex-shrink: 0;
        color: inherit;
        opacity: 0.6;
        text-decoration: none;
        cursor: pointer;

        svg {
          display: block;
          width: 1.5rem;
          height: 1.5rem;
          fill: currentColor;
        }
        .icon-copied { display: none; }

        &.copied .icon-copy { display: none; }
        &.copied .icon-copied { display: block; }
      }
      .copy-link:hover {
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <main>
      <p>Your IP address is:</p>
      <div class="ip-row">
      <div class="ip"></div>
      <a href="#" class="copy-link" onclick="copyIP(event)" aria-label="Copy">
        <svg class="icon-copy" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><path d="M480 400L288 400C279.2 400 272 392.8 272 384L272 128C272 119.2 279.2 112 288 112L421.5 112C425.7 112 429.8 113.7 432.8 116.7L491.3 175.2C494.3 178.2 496 182.3 496 186.5L496 384C496 392.8 488.8 400 480 400zM288 448L480 448C515.3 448 544 419.3 544 384L544 186.5C544 169.5 537.3 153.2 525.3 141.2L466.7 82.7C454.7 70.7 438.5 64 421.5 64L288 64C252.7 64 224 92.7 224 128L224 384C224 419.3 252.7 448 288 448zM160 192C124.7 192 96 220.7 96 256L96 512C96 547.3 124.7 576 160 576L352 576C387.3 576 416 547.3 416 512L416 496L368 496L368 512C368 520.8 360.8 528 352 528L160 528C151.2 528 144 520.8 144 512L144 256C144 247.2 151.2 240 160 240L176 240L176 192L160 192z"/></svg>
        <svg class="icon-copied" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><path d="M384 64C407.7 64 428.4 76.9 439.4 96L448 96C483.3 96 512 124.7 512 160L512 512C512 547.3 483.3 576 448 576L192 576C156.7 576 128 547.3 128 512L128 160C128 124.7 156.7 96 192 96L200.6 96C211.6 76.9 232.3 64 256 64L384 64zM410.9 276.6C400.2 268.8 385.2 271.2 377.4 281.9L291.8 399.6L265.3 372.2C256.1 362.7 240.9 362.4 231.4 371.6C221.9 380.8 221.6 396 230.8 405.5L277.2 453.5C282.1 458.6 289 461.3 296.1 460.8C303.2 460.3 309.7 456.7 313.9 451L416.2 310.1C424 299.4 421.6 284.4 410.9 276.6zM264 128C250.7 128 240 138.7 240 152C240 165.3 250.7 176 264 176L376 176C389.3 176 400 165.3 400 152C400 138.7 389.3 128 376 128L264 128z"/></svg>
      </a>
      </div>
    </main>
    <footer>
      <a href="https://github.com/slunsford/ip-minimalist" target="_blank" aria-label="GitHub">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><path d="M237.9 461.4C237.9 463.4 235.6 465 232.7 465C229.4 465.3 227.1 463.7 227.1 461.4C227.1 459.4 229.4 457.8 232.3 457.8C235.3 457.5 237.9 459.1 237.9 461.4zM206.8 456.9C206.1 458.9 208.1 461.2 211.1 461.8C213.7 462.8 216.7 461.8 217.3 459.8C217.9 457.8 216 455.5 213 454.6C210.4 453.9 207.5 454.9 206.8 456.9zM251 455.2C248.1 455.9 246.1 457.8 246.4 460.1C246.7 462.1 249.3 463.4 252.3 462.7C255.2 462 257.2 460.1 256.9 458.1C256.6 456.2 253.9 454.9 251 455.2zM316.8 72C178.1 72 72 177.3 72 316C72 426.9 141.8 521.8 241.5 555.2C254.3 557.5 258.8 549.6 258.8 543.1C258.8 536.9 258.5 502.7 258.5 481.7C258.5 481.7 188.5 496.7 173.8 451.9C173.8 451.9 162.4 422.8 146 415.3C146 415.3 123.1 399.6 147.6 399.9C147.6 399.9 172.5 401.9 186.2 425.7C208.1 464.3 244.8 453.2 259.1 446.6C261.4 430.6 267.9 419.5 275.1 412.9C219.2 406.7 162.8 398.6 162.8 302.4C162.8 274.9 170.4 261.1 186.4 243.5C183.8 237 175.3 210.2 189 175.6C209.9 169.1 258 202.6 258 202.6C278 197 299.5 194.1 320.8 194.1C342.1 194.1 363.6 197 383.6 202.6C383.6 202.6 431.7 169 452.6 175.6C466.3 210.3 457.8 237 455.2 243.5C471.2 261.2 481 275 481 302.4C481 398.9 422.1 406.6 366.2 412.9C375.4 420.8 383.2 435.8 383.2 459.3C383.2 493 382.9 534.7 382.9 542.9C382.9 549.4 387.5 557.3 400.2 555C500.2 521.8 568 426.9 568 316C568 177.3 455.5 72 316.8 72zM169.2 416.9C167.9 417.9 168.2 420.2 169.9 422.1C171.5 423.7 173.8 424.4 175.1 423.1C176.4 422.1 176.1 419.8 174.4 417.9C172.8 416.3 170.5 415.6 169.2 416.9zM158.4 408.8C157.7 410.1 158.7 411.7 160.7 412.7C162.3 413.7 164.3 413.4 165 412C165.7 410.7 164.7 409.1 162.7 408.1C160.7 407.5 159.1 407.8 158.4 408.8zM190.8 444.4C189.2 445.7 189.8 448.7 192.1 450.6C194.4 452.9 197.3 453.2 198.6 451.6C199.9 450.3 199.3 447.3 197.3 445.4C195.1 443.1 192.1 442.8 190.8 444.4zM179.4 429.7C177.8 430.7 177.8 433.3 179.4 435.6C181 437.9 183.7 438.9 185 437.9C186.6 436.6 186.6 434 185 431.7C183.6 429.4 181 428.4 179.4 429.7z"/></svg>
      </a>
    </footer>
    <script>
      let currentIP = '';

      fetch('https://api.ipify.org?format=text')
        .then(r => r.text())
        .then(ip => {
          const cleanIp = ip.trim();
          currentIP = cleanIp;
          document.querySelector('.ip').textContent = cleanIp;
          document.querySelector('.ip-row').style.visibility = 'visible';
          document.title = cleanIp;
        });

      function copyIP(event) {
        event.preventDefault();
        if (currentIP) {
          navigator.clipboard.writeText(currentIP).then(() => {
            const copyLink = document.querySelector('.copy-link');
            copyLink.classList.add('copied');
            setTimeout(() => copyLink.classList.remove('copied'), 1000);
          }).catch(() => {});
        }
      }
    </script>
  </body>
</html>
